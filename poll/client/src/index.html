<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poll Demo</title>
  <link rel="stylesheet" href="./main.css" />
</head>

<body>
  <main class="layout">
    <section class="card stack">
      <p class="eyebrow">Server-Sent Events Demo</p>
      <h1>Favorite Development OS</h1>
      <p class="intro">Vote once from this browser and watch the pie chart update in real time.</p>

      <div id="voted" class="message success hidden" role="status">Thanks for your vote.</div>

      <div id="hasVotedAlreadyErrorMsg" class="message info hidden" role="status">
        You have already voted from this browser.
      </div>

      <form id="vote-form" class="stack hidden">
        <fieldset class="poll-options">
          <legend>Which operating system do you prefer for development?</legend>

          <label class="option" for="windows">
            <input type="radio" name="os" id="windows" value="Windows">
            <span>Windows</span>
          </label>

          <label class="option" for="macos">
            <input type="radio" name="os" id="macos" value="macOS">
            <span>macOS</span>
          </label>

          <label class="option" for="linux">
            <input type="radio" name="os" id="linux" value="Linux">
            <span>Linux</span>
          </label>

          <label class="option" for="other">
            <input type="radio" name="os" id="other" value="Other">
            <span>Other</span>
          </label>
        </fieldset>

        <button class="vote-button" id="vote-button" type="button">Submit vote</button>
      </form>
    </section>

    <section class="card chart-card">
      <div id="chart" class="chart"></div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>

</body>

</html>
